# .github/workflows/fetch_launches.yml

name: Historical Launch Fetch

on:
  workflow_dispatch:

  schedule:
    # every hour at minute 2
    - cron: "2 * * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest

    timeout-minutes: 55

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run historical fetcher
        run: |
          python fetch_historical_launches.py

      # IMPORTANT:
      # ALWAYS commit progress
      # even if script partially failed
      - name: Commit and push progress
        if: always()
        run: |

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "Historical crawler progress" || echo "No changes"

          git pull --rebase origin main || true

          git push || true
