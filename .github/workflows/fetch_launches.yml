# .github/workflows/fetch_launches.yml

name: Historical Launch Fetch

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run fetcher
        run: |
          python fetch_historical_launches.py

      - name: Commit progress
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "Historical launch fetch progress" || echo "No changes"

          git push
